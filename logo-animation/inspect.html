<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>inspect</title>
<style>
  body{margin:0;background:#071321;color:#fff;font-family:system-ui;display:flex;gap:24px;flex-wrap:wrap;padding:24px}
  .card{position:relative;width:300px;height:300px;border:1px solid #234}
  .grid{position:absolute;inset:0;background-image:linear-gradient(#ffffff22 1px,transparent 1px),linear-gradient(90deg,#ffffff22 1px,transparent 1px);background-size:30px 30px}
  .metal{position:absolute;inset:0;background:linear-gradient(135deg,#8C6A1E,#D4AF37 40%,#FFE7A0 50%,#D4AF37 60%,#8C6A1E)}
  .cut{position:absolute;inset:0}
  .cut svg{width:100%;height:100%;display:block}
  .cut svg path{fill:#071321}
  .raw svg{width:100%;height:100%}
  h4{width:100%;margin:4px 0}
  /* numbered rows to read coordinates */
  .ticks span{position:absolute;left:0;font-size:10px;color:#9cf}
</style>
</head>
<body>
<h4>1) RAW (original fill)</h4>
<div class="card raw" id="raw"></div>

<h4>2) Metal-behind + cut (fill = bg)</h4>
<div class="card">
  <div class="metal"></div>
  <div class="cut" id="cut"></div>
  <div class="grid"></div>
</div>

<script>
async function main(){
  const res = await fetch('../assets/logo.svg');
  const txt = await res.text();
  document.getElementById('raw').innerHTML = txt;
  document.getElementById('cut').innerHTML = txt;
  // report viewBox + path bbox
  const svg = document.querySelector('#cut svg');
  const paths = svg.querySelectorAll('path');
  let report = 'viewBox='+svg.getAttribute('viewBox')+' paths='+paths.length;
  try{
    const b = paths[0].getBBox();
    report += ' path0 bbox x='+b.x.toFixed(0)+' y='+b.y.toFixed(0)+' w='+b.width.toFixed(0)+' h='+b.height.toFixed(0);
    report += ' len='+paths[0].getTotalLength().toFixed(0);
  }catch(e){report+=' err '+e;}
  document.title = report;
  const h = document.createElement('h4'); h.textContent = report; document.body.appendChild(h);
}
main();
</script>
</body>
</html>
